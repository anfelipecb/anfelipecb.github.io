name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@v0.13.1
        with:
          commitChange: false
          valueFile: '_config.yml'
          propertyPath: 'giscus.repo'
          value: ${{ github.repository }}

      - name: Install dependencies
        run: |
          pip3 install --upgrade jupyter
          npm install -g mermaid.cli

      - name: Build site (Jekyll)
        run: |
          export JEKYLL_ENV=production
          bundle exec jekyll build --destination _site

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          fail: true
          # Excludes: font-CDN preconnect roots (not real pages, present on every
          # page) and a relative LICENSE link inside an al-folio sample post.
          # TODO: remove the streamlit.app exclude once the AI Deliberative
          # Committee app is awake/public again (currently redirects to login).
          args: >-
            --user-agent 'curl/7.54' --verbose --no-progress
            --exclude '^https://fonts\.(googleapis|gstatic)\.com/?$'
            --exclude 'blob/master/LICENSE'
            --exclude 'ai-augmetnted-deliberative-committee-hpic\.streamlit\.app'
            '_site/**/*.html'
